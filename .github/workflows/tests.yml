---
name: Tests and Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

env:
  FOUNDRY_PROFILE: ci
  TERM: ansi

permissions:
  security-events: write

jobs:
  security:
    uses: lidofinance/linters/.github/workflows/security.yml@master
  actions:
    uses: lidofinance/linters/.github/workflows/actions.yml@master

  bootstrap:
    name: Bootstrap environment
    runs-on: ubuntu-latest
    outputs:
      cache-path: ${{ steps.cache.outputs.path }}
      cache-key: ${{ steps.cache.outputs.key }}
    env:
      JUST_TAG: 1.24.0
    steps:
      - name: Build cache params
        id: cache
        run: |
          echo "path=$CACHE_PATH" >> "$GITHUB_OUTPUT"
          echo "$KEY_INPUT" | md5sum | awk '{print $1}' | xargs -I% echo "key=cargobin-%-${RUNNER_OS}" >> "$GITHUB_OUTPUT"
        env:
          CACHE_PATH: |
            ~/.cargo/bin/
          KEY_INPUT: |
            just:${{env.JUST_TAG}}

      - uses: actions/cache@v4
        id: get-cache
        with:
          path: ${{ steps.cache.outputs.path }}
          key: ${{ steps.cache.outputs.key }}

      - name: Install just
        run: cargo install "just@$JUST_TAG"
        if: steps.get-cache.outputs.cache-hit != 'true'

  linters:
    name: Linters
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set FOUNDRY_VERSION
        run: echo "FOUNDRY_VERSION=$(head .foundryref)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ needs.bootstrap.outputs.cache-path }}
          key: ${{ needs.bootstrap.outputs.cache-key }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: yarn
          cache-dependency-path: "**/yarn.lock"

      - name: Install dependencies
        run: just deps-dev

      - name: Linters check
        run: just lint

  foundry:
    name: Foundry project
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set FOUNDRY_VERSION
        run: echo "FOUNDRY_VERSION=$(head .foundryref)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ needs.bootstrap.outputs.cache-path }}
          key: ${{ needs.bootstrap.outputs.cache-key }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: yarn
          cache-dependency-path: "**/yarn.lock"

      - name: Install dependencies
        run: just deps

      - name: Build
        run: just build --sizes
        continue-on-error: false

      - name: Run unit-tests
        run: just test-unit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set FOUNDRY_VERSION
        run: echo "FOUNDRY_VERSION=$(head .foundryref)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ needs.bootstrap.outputs.cache-path }}
          key: ${{ needs.bootstrap.outputs.cache-key }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: yarn
          cache-dependency-path: "**/yarn.lock"

      - name: Install dependencies
        run: just deps

      - name: Run coverage
        run: just coverage-lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  slither:
    name: Slither
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set FOUNDRY_VERSION
        run: echo "FOUNDRY_VERSION=$(head .foundryref)" >> "$GITHUB_ENV"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: yarn
          cache-dependency-path: "**/yarn.lock"

      - name: Install dependencies
        run: yarn workspaces focus --all --production

      - name: Run Slither
        id: slither
        uses: crytic/slither-action@v0.4.1
        with:
          fail-on: medium
          sarif: results.sarif

      - name: Upload SARIF
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
