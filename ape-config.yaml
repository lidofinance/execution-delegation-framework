name: delegated-execution-authority

plugins:
  - name: solidity
    version: 0.8.5
  - name: foundry
    version: 0.8.11

solidity:
  version: "0.8.28"
  import_remapping:
    - "@openzeppelin/contracts=.cache/OpenZeppelin/openzeppelin-contracts@v5.2.0/contracts"

dependencies:
  - name: OpenZeppelin
    github: OpenZeppelin/openzeppelin-contracts
    version: v5.2.0

networks:
  custom:
    - name: hoodi
      chain_id: 560048
      ecosystem: ethereum

node:
  ethereum:
    hoodi:
      http_uri: ${HOODI_RPC_URI}

etherscan:
  ethereum:
    hoodi:
      uri: https://hoodi.etherscan.io
      api_uri: https://api-hoodi.etherscan.io/api
